; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Project layout expected:
;   src/
;     main.cpp
;     st7735.c
;     st7735.h
;     mcp23s17.c
;     mcp23s17.h
;     mcp4728.cpp
;     mcp4728.h
;     ADC_measurement.c
;     ADC_measurement.h
;
; All .c/.cpp files in src/ are compiled automatically.

[env:rpipico]
platform = raspberrypi
board = rpipico
framework = picosdk
upload_protocol = picotool

; Link libm for logf() used in NTC temperature calculation
build_flags =
    -lm